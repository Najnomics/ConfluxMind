[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
test = "tests"

[profile.default.fmt]
line_length = 120

[rpc_endpoints]
conflux_espace = "${CONFLUX_ESPACE_RPC}"
conflux_espace_testnet = "${CONFLUX_ESPACE_TESTNET_RPC}"

[etherscan]
conflux_espace = { key = "", url = "https://evmapi.confluxscan.io/api" }
conflux_espace_testnet = { key = "", url = "https://evmapi-testnet.confluxscan.io/api" }
